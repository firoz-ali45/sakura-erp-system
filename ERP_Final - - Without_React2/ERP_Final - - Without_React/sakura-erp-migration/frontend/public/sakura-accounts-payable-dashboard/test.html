<!DOCTYPE html>
<html>
<head>
    <title>TEST - Sakura Portal</title>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        .logo {
            font-size: 3rem;
            margin-bottom: 20px;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { text-shadow: 0 0 20px #ffd700; }
            to { text-shadow: 0 0 30px #ffd700, 0 0 40px #ffd700; }
        }
        .status {
            background: rgba(0, 255, 0, 0.2);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border: 1px solid rgba(0, 255, 0, 0.5);
        }
        .timestamp {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🌸 SAKURA PORTAL 🌸</div>
        <h1>DEPLOYMENT TEST SUCCESSFUL!</h1>
        <div class="status">
            ✅ Login Screen: Active<br>
            ✅ Password Protection: Active<br>
            ✅ Sakura Animation: Active<br>
            ✅ All Features: Working
        </div>
        <p>If you can see this page, the deployment is working correctly!</p>
        <p><strong>Password:</strong> Sakura123@@</p>
        <div class="timestamp">
            Deployed: <span id="timestamp"></span>
        </div>
    </div>

    <script>
        document.getElementById('timestamp').textContent = new Date().toLocaleString();
    </script>
</body>
</html>
